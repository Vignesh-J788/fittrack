<!DOCTYPE html>
<html>
<head>
    <title>FitTrack Pro</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#4f46e5,#06b6d4);
        }

        .box {
            width: 350px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input { width: 50%; }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
            color: white;
            background: #00c6ff;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🏃 FitTrack Pro</h2>

    <input placeholder="Name">

    <div class="row">
        <input placeholder="Steps">
        <input placeholder="Calories">
    </div>

    <div class="row">
        <input placeholder="Duration">
        <input placeholder="Weight (kg)">
    </div>

    <input placeholder="Height (m)">

    <button onclick="enterDashboard()">Enter Dashboard →</button>
</div>

<script>
function enterDashboard() {
    let inputs = document.querySelectorAll("input");

    let name = inputs[0].value.trim();
    let steps = +inputs[1].value;
    let calories = +inputs[2].value;
    let duration = +inputs[3].value;
    let weight = +inputs[4].value;
    let height = +inputs[5].value;

    // VALIDATION
    if (!name || !steps || !calories || !duration || !weight || !height) {
        alert("Please fill all fields ❗");
        return;
    }

    if (steps < 0 || calories < 0 || duration < 0 || weight <= 0 || height <= 0) {
        alert("Values must be positive ❗");
        return;
    }

    if (height > 3) {
        alert("Enter height in meters (e.g., 1.75)");
        return;
    }

    let data = {
        name, steps, calories, duration, weight, height
    };

    localStorage.setItem("userData", JSON.stringify(data));

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
