<!DOCTYPE html>
<html>
<head>
    <title>FitTrack Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="greeting"></h2>

<div class="top-row">

    <div class="card steps">
        <h3>Steps</h3>
        <div class="ring" id="stepsRing">
            <span id="stepsValue"></span>
        </div>
        <p id="stepsRemain"></p>
    </div>

    <div class="card calories">
        <h3>Calories</h3>
        <div class="ring" id="calRing">
            <span id="calValue"></span>
        </div>
        <p id="calRemain"></p>
    </div>

</div>

<div class="bottom-row">

    <div class="card bmi">
        <h3>BMI</h3>
        <p id="bmiValue"></p>
    </div>

    <div class="card duration">
        <h3>Duration</h3>
        <p id="durValue"></p>
    </div>

</div>

<div class="graph-row">
    <canvas id="stepsChart"></canvas>
    <canvas id="calChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
